name = "eletwave-integrations"
main = "src/index.js"
compatibility_date = "2026-03-19"

[vars]
ALLOWED_ORIGIN = "*"
INSTAGRAM_API_VERSION = "v25.0"
INSTAGRAM_HOST = "graph.instagram.com"
INSTAGRAM_POST_LIMIT = "6"
GOOGLE_REVIEW_LIMIT = "6"
CACHE_TTL_INSTAGRAM = "3600"
CACHE_TTL_GOOGLE = "21600"
CACHE_TTL_DISCOVER = "300"
