name: Sync Integrations

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync data files
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_PROFILE_URL: ${{ vars.INSTAGRAM_PROFILE_URL }}
          INSTAGRAM_API_VERSION: ${{ vars.INSTAGRAM_API_VERSION }}
          INSTAGRAM_HOST: ${{ vars.INSTAGRAM_HOST }}
          INSTAGRAM_POST_LIMIT: ${{ vars.INSTAGRAM_POST_LIMIT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_BUSINESS_NAME: ${{ vars.GOOGLE_BUSINESS_NAME }}
          GOOGLE_PROFILE_URL: ${{ vars.GOOGLE_PROFILE_URL }}
          GOOGLE_REVIEW_URL: ${{ vars.GOOGLE_REVIEW_URL }}
          GOOGLE_REVIEW_LIMIT: ${{ vars.GOOGLE_REVIEW_LIMIT }}
          GBP_ACCOUNT_ID: ${{ vars.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ vars.GBP_LOCATION_ID }}
        run: node ./scripts/sync-integrations.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/google-business.json data/instagram.json
          git commit -m "chore: sync integrations data"
          git push
